# Caption generation parameters — Strategy A (strict no-leak)
#
# Usage:
#   export OPENAI_API_KEY='sk-...'
#   python caption_gen/generate.py --config configs/caption_gen.yaml --split train --n 1500 --resume
#   python caption_gen/generate.py --config configs/caption_gen.yaml --split val   --n 650  --resume
#
# CLI flags override YAML values. Run with --dry-run to verify prompt without API calls.

api:
  model: gpt-4o                 # gpt-4o | gpt-4o-mini | gpt-4.1 | gpt-4.1-mini
  temperature: 0.1              # low temp for deterministic, low-hallucination output
  max_tokens: 80                # ~25 words × 1.3 tok/word + margin
  timeout: 60.0                 # per-request timeout in seconds
  max_retries: 6                # exponential backoff attempts

sampling:
  seed: 42
  # stratify: controlled by --no-stratify flag (requires metadata.csv)
  # n_per_class fractions used when stratifying:
  #   melanoma:             30% of n
  #   nevus:                30% of n
  #   seborrheic keratosis: 40% of n  (matches ISIC 2017 Task 3 evaluation balance)

output:
  dir: ./outputs/captions       # relative to cwd; overrideable with --out
  # filename pattern: captions_<split>.jsonl
  # summary pattern:  caption_summary_<split>.json

data:
  # Dataset root. Takes lowest precedence — ISIC_ROOT env var overrides this,
  # and the data_loader.py module-level default also reads ISIC_ROOT.
  isic_root: /Users/mike/Documents/GRA591/datasets/ISIC17_18/isic2017
  # metadata.csv is optional — needed only for stratified sampling.
  # Download instructions: python caption_gen/download_metadata.py
