# Conda environment for TextSwinUMamba — mirrors Swin-UMamba's known-good combo.
#
# Create with:
#   conda env create -f environment.yml
#   conda activate textswinumamba
#
# This pins torch 2.0.1 + CUDA 11.8 + causal-conv1d 1.1.1 + mamba-ssm 1.1.1 —
# the exact versions Swin-UMamba's authors tested with. The mamba kernel is
# very sensitive to these pins; newer releases broke our selective_scan_interface
# import path.

name: textswinumamba
channels:
  - conda-forge
dependencies:
  - python=3.10
  - pip
  - pip:
      # --- pin first: torch with CUDA 11.8 (matches the mamba/causal-conv1d wheels) ---
      - --extra-index-url https://download.pytorch.org/whl/cu118
      - torch==2.0.1
      - torchvision==0.15.2

      # --- Mamba kernel (Swin-UMamba's tested combo) ---
      - causal-conv1d==1.1.1
      - mamba-ssm==1.1.1

      # --- model + numerics ---
      - einops
      - timm
      - numba
      - torchinfo
      # numpy 2.x breaks the mamba-ssm wheel ABI; pin to the 1.x line.
      - numpy<2.0

      # --- text encoder ---
      # Pinned to the version that works with tokenizers 0.15 and our mamba wheels.
      - transformers==4.36.2

      # --- data / augmentation ---
      # Pinned to the wheel that ships with manylinux2014 (matches Colab base image).
      - opencv-python==4.8.1.78
      - albumentations
      - pillow

      # --- training infra ---
      - matplotlib
      - pyyaml
      - tqdm
